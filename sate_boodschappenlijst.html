<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boodschappenlijst – Saté Ajam</title>
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" sizes="180x180">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boodschappenlijst">
<style>
  :root{--bg:#0b1220;--card:#111827;--ink:#e5e7eb;--muted:#9ca3af;--accent:#22c55e;--border:#1f2937}
  html,body{height:100%} 
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#0b1220,#111827);color:var(--ink)}
  .wrap{max-width:860px;margin:0 auto;padding:20px 16px 88px}
  header{display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap}
  h1{font-size:1.4rem;margin:10px 0}
  .subtitle{color:var(--muted);font-size:.95rem;margin-top:-6px}
  .controls{display:flex;gap:8px;flex-wrap:wrap}
  button, .btn{background:#1f2937;border:1px solid var(--border);color:var(--ink);padding:10px 12px;border-radius:10px;cursor:pointer}
  button:hover{border-color:#374151}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:18px}
  .card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px}
  .card h2{font-size:1.05rem;margin:0 0 8px 0}
  ul{list-style:none;padding:0;margin:0;display:grid;gap:6px}
  li{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;border:1px dashed transparent}
  li.done{opacity:.6;text-decoration:line-through}
  input[type=checkbox]{width:20px;height:20px}
  footer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(17,24,39,.0),rgba(17,24,39,.92));padding:10px 16px}
  .status{max-width:860px;margin:0 auto;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .tip{font-size:.9rem}
  .sr{position:absolute;left:-9999px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.9rem;margin-bottom:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.03);transition:all .2s ease}
  .back-btn:hover{color:var(--ink);border-color:#374151;background:rgba(255,255,255,.06)}
</style>
</head>
<body>
<noscript><div style="padding:20px;color:#e5e7eb;background:#1f2937;margin:16px;border-radius:10px;">JavaScript is uitgeschakeld. Zet JavaScript aan om deze pagina te gebruiken.</div></noscript>
  <div class="wrap">
    <a href="index.html" class="back-btn">&#8592; Terug naar recepten</a>
    <header>
      <div>
        <h1>Checklist – Boodschappenlijst Saté Ajam</h1>
        <div class="subtitle">Werkt als app op je iPhone. Offline, met lokale opslag.</div>
      </div>
      <div class="controls">
        <button id="checkAll">Alles aanvinken</button>
        <button id="uncheckAll">Alles uitvinken</button>
        <button id="reset">Reset</button>
        <button id="share">Deel/Exporteer</button>
      </div>
    </header>

    <section class="grid" id="list"></section>
  </div>

  <footer>
    <div class="status">
      <div id="progress">0/0 afgevinkt</div>
      <div class="tip">Tip: voeg eigen items toe via “+ Item”. Toevoegen aan beginscherm via Deel‑icoon → Zet op beginscherm.</div>
    </div>
  </footer>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}

const DATA = [
  { title:"Marinade", items:[
    {id:"kipdijfilet", label:"1 kilo kipdijfilet"},
    {id:"knoflook", label:"3 tenen knoflook"},
    {id:"sambal", label:"1,5 eetlepel sambal oelek"},
    {id:"zout", label:"1 theelepel zout"},
    {id:"citroensap", label:"2 eetlepels citroensap"},
    {id:"olie", label:"2 eetlepels olie"},
    {id:"ketjap", label:"1,5 kopje ketjap Manis"}
  ]},
  { title:"Pindasaus", items:[
    {id:"pindakaas", label:"350 g pindakaas"},
    {id:"zonnebloemolie", label:"scheutje zonnebloemolie"},
    {id:"djahé", label:"2 theelepels djahé"},
    {id:"ketoembar", label:"2 theelepels ketoembar"},
    {id:"trassi", label:"1 theelepel trassi"},
    {id:"djinten", label:"0,5 theelepel djinten"},
    {id:"ketjap", label:"1 kopje ketjap"},
    {id:"citroensap", label:"scheutje citroensap"},
    {id:"sambal", label:"sambal oelek naar smaak"},
    {id:"zout", label:"zout naar smaak"},
    {id:"suiker", label:"suiker naar smaak"}
  ]}
];

const STORAGE_KEY = 'sate-ajam-checklist-v1';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || {};

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateProgress(); }

function render(){
  const root = document.getElementById('list');
  root.innerHTML = '';
  DATA.forEach(section => {
    const card = document.createElement('div');
    card.className = 'card';

    const h2 = document.createElement('h2');
    h2.textContent = section.title;

    const addBtn = document.createElement('button');
    addBtn.className = 'btn';
    addBtn.style.float = 'right';
    addBtn.title = 'Eigen item toevoegen';
    addBtn.textContent = '+ Item';
    addBtn.addEventListener('click', () => {
      const label = prompt('Nieuw item voor "' + section.title + '"');
      if(!label) return;
      const id = (section.title + '-' + label).toLowerCase().replace(/[^a-z0-9]+/g,'-');
      section.items.push({id, label});
      render();
    });

    const ul = document.createElement('ul');

    section.items.forEach(it => {
      const li = document.createElement('li');
      const cb = document.createElement('input');
      cb.type='checkbox';
      cb.id = it.id;
      cb.checked = !!state[it.id];
      cb.addEventListener('change', () => { state[it.id] = cb.checked; li.classList.toggle('done', cb.checked); save(); });

      const lab = document.createElement('label');
      lab.setAttribute('for', it.id);
      lab.textContent = it.label;

      li.classList.toggle('done', cb.checked);
      li.appendChild(cb); li.appendChild(lab);
      ul.appendChild(li);
    });

    card.appendChild(addBtn);
    card.appendChild(h2);
    card.appendChild(ul);
    root.appendChild(card);
  });
  updateProgress();
}

function updateProgress(){
  const allIds = DATA.flatMap(s=>s.items.map(i=>i.id));
  const done = allIds.filter(id => state[id]).length;
  const el = document.getElementById('progress');
  el.textContent = `${done}/${allIds.length} afgevinkt`;
}

function setAll(val){
  DATA.forEach(s=>s.items.forEach(i=> state[i.id]=val));
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{ cb.checked=val; cb.dispatchEvent(new Event('change')); });
  save();
}

// Controls
 document.getElementById('checkAll').addEventListener('click', ()=>setAll(true));
 document.getElementById('uncheckAll').addEventListener('click', ()=>setAll(false));
 document.getElementById('reset').addEventListener('click', ()=>{ if(confirm('Alles resetten?')){ state={}; save(); render(); }});
 document.getElementById('share').addEventListener('click', async ()=>{
    const all = DATA.flatMap(s=>s.items.map(i=>({id:i.id,label:i.label,done:!!state[i.id]})));
    const lines = all.map(x=> `${x.done?'[x]':'[ ]'} ${x.label}`).join('\n');
    const text = `Saté Ajam – Checklist\n\n${lines}`;
    try{
      await navigator.clipboard.writeText(text);
      alert('Checklist gekopieerd naar je klembord!');
    }catch(e){
      prompt('Kopieer de checklist:', text);
    }
 });

render();
</script>
</body>
</html>
